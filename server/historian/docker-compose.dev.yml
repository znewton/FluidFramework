version: '3.4'
services:
    historian:
        ports:
            - 3001:3000
        volumes:
            - .:/home/node/server
            - /home/node/server/node_modules/zookeeper
        restart: always
        environment:
            - "http_keyFilePath=/home/node/server/certs/localhost.key"
            - "http_certFilePath=/home/node/server/certs/localhost.crt"
networks:
  default:
      external:
          name: routerlicious_default
